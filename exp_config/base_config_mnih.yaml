x_dir: "experimentos_massachusetts/x_dir/"
y_dir: "experimentos_massachusetts/y_dir/"
base_exp_dir: "experimentos_massachusetts/"

model_params:
  input_shape: [256, 256, 3]
  n_classes: 2
  model_type: "resunet"

eval_kwargs:
  label_tiles_dir: 'dataset_massachusetts_mnih_mod/test/maps/'
  splits: ['test']
  buffers_px: [0, 3]
  include_avg_precision: False

mosaic_kwargs:
  export_pred_mosaics: False
  export_prob_mosaics: False
  ignore_index: 255
  min_area_px: null

eval_mosaic_kwargs:
  buffers_px: [0, 3]
  include_avg_precision: False
  min_area_px: null

uncertainty_kwargs:
  data_groups: ['Train', 'Valid', 'Test']
  scale_result: True
  metric_kwargs:
    min_target_scale: 0
    max_target_scale: 1
    perc_cut: null
  label_tiles_dir: 'dataset_massachusetts_mnih_mod/test/maps/'
  info_tiles_name: 'info_tiles_test.json'
  ignore_index: 255
  export_mosaics: True
  generate_plot: True